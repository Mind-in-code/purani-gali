<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="500" height="600">
  <defs>
    <linearGradient id="goldGrad3a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4B85C"/>
      <stop offset="100%" stop-color="#A8893A"/>
    </linearGradient>
    <linearGradient id="goldGrad3ah" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="#C9A84C"/>
      <stop offset="80%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="600" fill="#0B0B0F"/>

  <!-- Mughal arch shape -->
  <path d="M 150 380 L 150 200 Q 150 100 250 80 Q 350 100 350 200 L 350 380"
        fill="none" stroke="url(#goldGrad3a)" stroke-width="1.5"/>

  <!-- Inner arch -->
  <path d="M 170 380 L 170 210 Q 170 120 250 102 Q 330 120 330 210 L 330 380"
        fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.3"/>

  <!-- Actual bottle: two straight cylinders, cap + body -->
  <g transform="translate(250, 205)">
    <!-- Cap — narrower cylinder, flat top with slight rounding -->
    <rect x="-11" y="-90" width="22" height="38" rx="3" ry="3"
          fill="none" stroke="url(#goldGrad3a)" stroke-width="1.5"/>

    <!-- Seam line between cap and body -->
    <line x1="-14" y1="-52" x2="14" y2="-52" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>

    <!-- Body — slightly wider cylinder, straight sides, flat bottom -->
    <rect x="-14" y="-52" width="28" height="95" rx="2" ry="2"
          fill="none" stroke="url(#goldGrad3a)" stroke-width="1.5"/>

    <!-- Bottom notch/cutout -->
    <rect x="-5" y="38" width="10" height="5" rx="1"
          fill="#0B0B0F" stroke="url(#goldGrad3a)" stroke-width="0.8" opacity="0.5"/>

    <!-- Subtle highlight on body -->
    <line x1="-6" y1="-44" x2="-6" y2="35" stroke="#C9A84C" stroke-width="0.6" opacity="0.1"/>
  </g>

  <!-- Horizontal line separator -->
  <line x1="165" y1="330" x2="335" y2="330" stroke="url(#goldGrad3ah)" stroke-width="0.5"/>

  <!-- Brand name -->
  <text x="250" y="360" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="400" letter-spacing="8" fill="#FFFFF0">PURANI</text>
  <text x="250" y="395" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="300" letter-spacing="8" fill="url(#goldGrad3a)">GALI</text>

  <!-- Bottom decorative line -->
  <line x1="165" y1="415" x2="335" y2="415" stroke="url(#goldGrad3ah)" stroke-width="0.5"/>

  <!-- Star motif -->
  <g transform="translate(250, 445)" opacity="0.6">
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#C9A84C" stroke-width="0.75"/>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#C9A84C" stroke-width="0.75"/>
    <line x1="-5.5" y1="-5.5" x2="5.5" y2="5.5" stroke="#C9A84C" stroke-width="0.75"/>
    <line x1="5.5" y1="-5.5" x2="-5.5" y2="5.5" stroke="#C9A84C" stroke-width="0.75"/>
    <circle cx="0" cy="0" r="2" fill="#C9A84C"/>
  </g>

  <!-- Tagline -->
  <text x="250" y="485" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" font-weight="300" letter-spacing="6" fill="#C4A882" opacity="0.7">PURE ESSENCE ATTAR</text>
</svg>
