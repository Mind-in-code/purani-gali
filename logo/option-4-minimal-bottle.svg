<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <defs>
    <linearGradient id="goldGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4B85C"/>
      <stop offset="100%" stop-color="#A8893A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="#0B0B0F"/>

  <!-- Minimal bottle icon (matches their actual matte black cylindrical bottle) -->
  <g transform="translate(150, 150)">
    <!-- Bottle cap -->
    <rect x="-10" y="-65" width="20" height="22" rx="2" fill="none" stroke="url(#goldGrad4)" stroke-width="1.2"/>

    <!-- Bottle neck -->
    <rect x="-7" y="-43" width="14" height="10" fill="none" stroke="url(#goldGrad4)" stroke-width="1"/>

    <!-- Bottle body -->
    <rect x="-14" y="-33" width="28" height="70" rx="3" fill="none" stroke="url(#goldGrad4)" stroke-width="1.5"/>

    <!-- Subtle body highlight -->
    <rect x="-6" y="-25" width="2" height="50" rx="1" fill="#C9A84C" opacity="0.12"/>

    <!-- Small PG monogram on bottle -->
    <text x="0" y="5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="400" letter-spacing="1" fill="#C9A84C" opacity="0.5">PG</text>
  </g>

  <!-- Vertical thin separator -->
  <line x1="220" y1="90" x2="220" y2="210" stroke="#C9A84C" stroke-width="0.5" opacity="0.25"/>

  <!-- Brand text -->
  <text x="260" y="135" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="400" letter-spacing="6" fill="#FFFFF0">Purani</text>
  <text x="260" y="190" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="300" letter-spacing="6" fill="url(#goldGrad4)">Gali</text>

  <!-- Tagline -->
  <text x="260" y="222" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" font-weight="300" letter-spacing="5" fill="#C4A882" opacity="0.7">PURE ESSENCE ATTAR</text>
</svg>
