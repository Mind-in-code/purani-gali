<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="goldGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4B85C"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A8893A"/>
    </linearGradient>
    <linearGradient id="goldLine1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="15%" stop-color="#C9A84C"/>
      <stop offset="85%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="#0B0B0F"/>

  <!-- Top decorative line -->
  <line x1="200" y1="60" x2="600" y2="60" stroke="url(#goldLine1)" stroke-width="0.5"/>

  <!-- Main brand name -->
  <text x="400" y="145" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" letter-spacing="18" fill="url(#goldGrad1)">PURANI</text>

  <!-- Secondary name -->
  <text x="400" y="205" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="300" letter-spacing="18" fill="#FFFFF0">GALI</text>

  <!-- Tagline -->
  <text x="400" y="248" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="300" letter-spacing="8" fill="#C4A882">PURE ESSENCE ATTAR</text>

  <!-- Bottom decorative line -->
  <line x1="200" y1="268" x2="600" y2="268" stroke="url(#goldLine1)" stroke-width="0.5"/>
</svg>
