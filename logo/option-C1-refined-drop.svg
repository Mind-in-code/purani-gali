<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="goldC1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4B85C"/>
      <stop offset="100%" stop-color="#A8893A"/>
    </linearGradient>
    <linearGradient id="goldC1mid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4B85C" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#A8893A" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="goldFadeC1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="25%" stop-color="#C9A84C"/>
      <stop offset="75%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#C9A84C" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="#0B0B0F"/>

  <!--
    REFINED: Rounder, more organic drop shapes.
    Each layer has distinct stroke weight to show hierarchy.
    Core glow is visible. Better spacing to text.
  -->

  <!-- Outer drop — base note (heaviest stroke, full gold gradient) -->
  <path d="M 200 90
           C 195 110 168 155 158 190
           C 148 228 150 260 162 282
           C 174 305 190 315 200 318
           C 210 315 226 305 238 282
           C 250 260 252 228 242 190
           C 232 155 205 110 200 90 Z"
        fill="none" stroke="url(#goldC1)" stroke-width="1.8"/>

  <!-- Middle drop — heart note (medium stroke, softer gold) -->
  <path d="M 200 138
           C 197 152 180 180 175 205
           C 170 230 172 252 180 266
           C 188 280 196 285 200 287
           C 204 285 212 280 220 266
           C 228 252 230 230 225 205
           C 220 180 203 152 200 138 Z"
        fill="none" stroke="url(#goldC1mid)" stroke-width="1.2"/>

  <!-- Inner drop — top note (lightest, delicate) -->
  <path d="M 200 182
           C 198 190 190 208 187 222
           C 184 236 186 248 191 256
           C 195 262 198 264 200 265
           C 202 264 205 262 209 256
           C 214 248 216 236 213 222
           C 210 208 202 190 200 182 Z"
        fill="none" stroke="#C9A84C" stroke-width="0.7" opacity="0.35"/>

  <!-- Core glow — the precious essence -->
  <circle cx="200" cy="238" r="10" fill="url(#coreGlow)"/>
  <circle cx="200" cy="238" r="2.5" fill="#C9A84C" opacity="0.4"/>

  <!-- ===== Brand name (tighter to the drop) ===== -->
  <line x1="140" y1="348" x2="260" y2="348" stroke="url(#goldFadeC1)" stroke-width="0.5" opacity="0.3"/>

  <text x="200" y="380" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="400" letter-spacing="8" fill="#FFFFF0">PURANI</text>
  <text x="200" y="413" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="300" letter-spacing="10" fill="url(#goldC1)">GALI</text>

  <line x1="140" y1="430" x2="260" y2="430" stroke="url(#goldFadeC1)" stroke-width="0.5" opacity="0.3"/>

  <text x="200" y="458" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8" font-weight="300" letter-spacing="5" fill="#C4A882" opacity="0.5">PURE ESSENCE ATTAR</text>
</svg>
