<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="goldGrad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4B85C"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A8893A"/>
    </linearGradient>
    <linearGradient id="fadeGold6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="#C9A84C"/>
      <stop offset="80%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="#0B0B0F"/>

  <!-- Top line -->
  <line x1="150" y1="35" x2="750" y2="35" stroke="url(#fadeGold6)" stroke-width="0.5" opacity="0.5"/>

  <!-- Left decorative element -->
  <g transform="translate(200, 100)" opacity="0.4">
    <line x1="-30" y1="0" x2="-12" y2="0" stroke="#C9A84C" stroke-width="0.75"/>
    <circle cx="-8" cy="0" r="2" fill="#C9A84C"/>
  </g>

  <!-- Main text: PURANI GALI as one line -->
  <text x="450" y="90" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="400" letter-spacing="14" fill="#FFFFF0">PURANI</text>

  <!-- Gold bar separator -->
  <rect x="340" y="105" width="220" height="1" fill="url(#fadeGold6)" opacity="0.4"/>

  <!-- GALI -->
  <text x="450" y="145" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="300" letter-spacing="20" fill="url(#goldGrad6)">GALI</text>

  <!-- Right decorative element -->
  <g transform="translate(700, 100)" opacity="0.4">
    <line x1="12" y1="0" x2="30" y2="0" stroke="#C9A84C" stroke-width="0.75"/>
    <circle cx="8" cy="0" r="2" fill="#C9A84C"/>
  </g>

  <!-- Bottom tagline -->
  <text x="450" y="175" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9" font-weight="300" letter-spacing="6" fill="#C4A882" opacity="0.6">EST.  ·  PURE ESSENCE ATTAR  ·  HANDCRAFTED</text>

  <!-- Bottom line -->
  <line x1="150" y1="190" x2="750" y2="190" stroke="url(#fadeGold6)" stroke-width="0.5" opacity="0.5"/>
</svg>
